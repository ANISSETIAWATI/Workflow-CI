name: CI
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: python --version

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set MLflow Tracking URI
        run: echo "MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}" >> $GITHUB_ENV
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

      - name: Run mlflow project
        run: mlflow run MLProject --env-manager=local
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

      - name: Get latest MLflow run_id
        run: |
          RESULT=$(python - << 'EOF'
          import mlflow
          import os
          import sys

          mlflow.set_tracking_uri(os.environ['MLFLOW_TRACKING_URI'])
          client = mlflow.tracking.MlflowClient()

          experiment = client.get_experiment_by_name('Default')

          if experiment is None:
              experiment = client.get_experiment('0')

          if experiment is None:
              experiments = client.search_experiments()
              if not experiments:
                  raise ValueError("Tidak ada experiment yang ditemukan!")
              experiment = experiments[0]

          sys.stderr.write(f"Menggunakan experiment: {experiment.name} (ID: {experiment.experiment_id})\n")

          runs = client.search_runs(
              experiment_ids=[experiment.experiment_id],
              order_by=['start_time DESC'],
              max_results=1
          )

          if not runs:
              raise ValueError(f"Tidak ada run di experiment '{experiment.name}'")

          run_id = runs[0].info.run_id
          sys.stderr.write(f"Run ID: {run_id}\n")

          # Cari artifact path yang mengandung MLmodel
          artifacts = client.list_artifacts(run_id)
          sys.stderr.write(f"Artifacts: {[a.path for a in artifacts]}\n")

          model_path = None
          for artifact in artifacts:
              if artifact.is_dir:
                  # Cek apakah folder ini berisi MLmodel
                  sub_artifacts = client.list_artifacts(run_id, artifact.path)
                  sub_paths = [s.path for s in sub_artifacts]
                  sys.stderr.write(f"  Sub-artifacts of '{artifact.path}': {sub_paths}\n")
                  if any('MLmodel' in s for s in sub_paths):
                      model_path = artifact.path
                      break

          if model_path is None:
              # Fallback ke 'model' jika tidak ditemukan
              model_path = 'model'
              sys.stderr.write("Tidak ada folder MLmodel ditemukan, fallback ke 'model'\n")

          sys.stderr.write(f"Model path: {model_path}\n")
          print(f"{run_id}|{model_path}")
          EOF
          )

          RUN_ID=$(echo $RESULT | cut -d'|' -f1)
          MODEL_PATH=$(echo $RESULT | cut -d'|' -f2)

          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "MODEL_PATH=$MODEL_PATH" >> $GITHUB_ENV
          echo "Run ID: $RUN_ID"
          echo "Model Path: $MODEL_PATH"
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

      - name: Install Python dependencies
        run: pip install google-auth google-auth-oauthlib google-api-python-client

      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          filename: "."
          folderId: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          overwrite: true

      - name: Build Docker Model
        run: mlflow models build-docker -m "runs:/$RUN_ID/$MODEL_PATH" -n "${{ secrets.DOCKER_USERNAME }}/telco-churn-model" --enable-mlserver
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Tag Docker Image
        run: docker tag ${{ secrets.DOCKER_USERNAME }}/telco-churn-model ${{ secrets.DOCKER_USERNAME }}/telco-churn-model:latest

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/telco-churn-model:latest
