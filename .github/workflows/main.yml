name: CI
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: python --version

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set MLflow Tracking URI
        run: echo "MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}" >> $GITHUB_ENV
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

      - name: Run mlflow project
        run: mlflow run MLProject --env-manager=local
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

      - name: Get latest MLflow run_id and model path
        run: |
          python - << 'EOF'
          import mlflow
          import os

          mlflow.set_tracking_uri(os.environ['MLFLOW_TRACKING_URI'])
          client = mlflow.tracking.MlflowClient()

          # Cari experiment
          experiment = client.get_experiment_by_name('Default')
          if experiment is None:
              experiment = client.get_experiment('0')
          if experiment is None:
              experiments = client.search_experiments()
              if not experiments:
                  raise ValueError("Tidak ada experiment yang ditemukan!")
              experiment = experiments[0]

          print(f"Experiment: {experiment.name} (ID: {experiment.experiment_id})")

          # Ambil run terbaru
          runs = client.search_runs(
              experiment_ids=[experiment.experiment_id],
              order_by=['start_time DESC'],
              max_results=1
          )
          if not runs:
              raise ValueError(f"Tidak ada run di experiment '{experiment.name}'")

          run_id = runs[0].info.run_id
          print(f"Run ID: {run_id}")

          # ── Fungsi rekursif untuk print semua artifacts ─────────────────────
          def print_artifacts(run_id, path="", indent=0):
              items = client.list_artifacts(run_id, path) if path else client.list_artifacts(run_id)
              for a in items:
                  prefix = "  " * indent
                  tag = "[DIR]" if a.is_dir else "[FILE]"
                  print(f"{prefix}{tag} {a.path}")
                  if a.is_dir:
                      print_artifacts(run_id, a.path, indent + 1)

          # ── Fungsi rekursif untuk scan direktori yang mengandung MLmodel ────
          def find_mlmodel_dirs(run_id, path=""):
              found = []
              artifacts = client.list_artifacts(run_id, path) if path else client.list_artifacts(run_id)
              file_paths = [a.path for a in artifacts if not a.is_dir]
              if any(p.endswith("MLmodel") for p in file_paths):
                  found.append(path)
              for a in artifacts:
                  if a.is_dir:
                      found.extend(find_mlmodel_dirs(run_id, a.path))
              return found

          # ── Print semua artifacts untuk debugging ───────────────────────────
          print("\n=== DAFTAR ARTIFACTS ===")
          print_artifacts(run_id)

          # ── Deteksi model path ──────────────────────────────────────────────
          model_dirs = find_mlmodel_dirs(run_id)
          print(f"\nDirektori dengan MLmodel: {model_dirs}")

          if not model_dirs:
              raise ValueError(
                  "FATAL: Tidak ada direktori yang mengandung file 'MLmodel'!\n"
                  "Pastikan training script memanggil mlflow.log_model() dengan benar.\n"
                  "Contoh: mlflow.sklearn.log_model(model, 'model')"
              )

          model_path = model_dirs[0]
          print(f"Model path terpilih: {model_path}")

          # Simpan ke GITHUB_ENV
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"RUN_ID={run_id}\n")
              f.write(f"MODEL_PATH={model_path}\n")
          EOF
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

      - name: Verify RUN_ID and MODEL_PATH
        run: |
          echo "RUN_ID = $RUN_ID"
          echo "MODEL_PATH = $MODEL_PATH"
          if [ -z "$RUN_ID" ]; then
            echo "ERROR: RUN_ID is empty!"
            exit 1
          fi
          if [ -z "$MODEL_PATH" ]; then
            echo "ERROR: MODEL_PATH is empty!"
            exit 1
          fi

      - name: Install Python dependencies
        run: pip install google-auth google-auth-oauthlib google-api-python-client

      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          filename: "."
          folderId: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          overwrite: true

      - name: Build Docker Model
        run: |
          echo "Building Docker image with runs:/$RUN_ID/$MODEL_PATH"
          mlflow models build-docker \
            -m "runs:/$RUN_ID/$MODEL_PATH" \
            -n "${{ secrets.DOCKER_USERNAME }}/telco-churn-model" \
            --enable-mlserver
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Tag Docker Image
        run: docker tag ${{ secrets.DOCKER_USERNAME }}/telco-churn-model ${{ secrets.DOCKER_USERNAME }}/telco-churn-model:latest

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/telco-churn-model:latest
