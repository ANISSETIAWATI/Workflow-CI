name: CI
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: python --version

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set MLflow Tracking URI
        run: echo "MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}" >> $GITHUB_ENV
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

      - name: Run mlflow project
        run: mlflow run MLProject --env-manager=local
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

      - name: Get latest MLflow run_id and model path
        run: |
          python - << 'EOF'
          import mlflow
          import os
          import sys

          mlflow.set_tracking_uri(os.environ['MLFLOW_TRACKING_URI'])
          client = mlflow.tracking.MlflowClient()

          # Cari experiment
          experiment = client.get_experiment_by_name('Default')
          if experiment is None:
              experiment = client.get_experiment('0')
          if experiment is None:
              experiments = client.search_experiments()
              if not experiments:
                  raise ValueError("Tidak ada experiment yang ditemukan!")
              experiment = experiments[0]

          print(f"Experiment: {experiment.name} (ID: {experiment.experiment_id})")

          # Ambil run terbaru
          runs = client.search_runs(
              experiment_ids=[experiment.experiment_id],
              order_by=['start_time DESC'],
              max_results=1
          )
          if not runs:
              raise ValueError(f"Tidak ada run di experiment '{experiment.name}'")

          run_id = runs[0].info.run_id
          print(f"Run ID: {run_id}")

          # List semua artifacts
          print("\n=== DAFTAR ARTIFACTS ===")
          artifacts = client.list_artifacts(run_id)
          if not artifacts:
              print("(kosong)")
          for a in artifacts:
              print(f"  {'[DIR]' if a.is_dir else '[FILE]'} {a.path}")
              if a.is_dir:
                  sub = client.list_artifacts(run_id, a.path)
                  for s in sub:
                      print(f"         {'[DIR]' if s.is_dir else '[FILE]'} {s.path}")

          # Deteksi model path (cari folder yang mengandung MLmodel)
          model_path = None
          for artifact in artifacts:
              if artifact.is_dir:
                  sub_artifacts = client.list_artifacts(run_id, artifact.path)
                  sub_paths = [s.path for s in sub_artifacts]
                  if any('MLmodel' in s for s in sub_paths):
                      model_path = artifact.path
                      print(f"\nDitemukan MLmodel di: {artifact.path}")
                      break

          if model_path is None:
              # Coba cek langsung apakah MLmodel ada di root
              root_paths = [a.path for a in artifacts]
              if 'MLmodel' in root_paths:
                  model_path = '.'
                  print("\nMLmodel ditemukan di root artifact")
              else:
                  model_path = 'model'
                  print(f"\n[WARNING] MLmodel tidak ditemukan, fallback ke path '{model_path}'")
                  print(f"Pastikan saat training kamu melakukan: mlflow.<flavor>.log_model(model, artifact_path='{model_path}')")

          print(f"\nModel path terpilih: {model_path}")

          # Simpan ke GITHUB_ENV
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"RUN_ID={run_id}\n")
              f.write(f"MODEL_PATH={model_path}\n")
          EOF
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

      - name: Verify RUN_ID and MODEL_PATH
        run: |
          echo "RUN_ID    = $RUN_ID"
          echo "MODEL_PATH = $MODEL_PATH"

      - name: Debug Artifacts
        run: |
          python - << 'EOF'
          import mlflow, os
          mlflow.set_tracking_uri(os.environ['MLFLOW_TRACKING_URI'])
          client = mlflow.tracking.MlflowClient()
          run_id = os.environ['RUN_ID']
          model_path = os.environ.get('MODEL_PATH', 'model')

          print("=== Artifacts di root ===")
          root_artifacts = client.list_artifacts(run_id)
          if not root_artifacts:
              print("  (kosong - tidak ada artifact sama sekali!)")
          for a in root_artifacts:
              print(f"  {a.path} ({'DIR' if a.is_dir else 'FILE'})")

          print(f"\n=== Artifacts di '{model_path}' ===")
          try:
              sub_artifacts = client.list_artifacts(run_id, model_path)
              if not sub_artifacts:
                  print("  (kosong)")
              for a in sub_artifacts:
                  print(f"  {a.path} ({'DIR' if a.is_dir else 'FILE'})")
          except Exception as e:
              print(f"  ERROR saat list artifacts: {e}")
          EOF
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          RUN_ID: ${{ env.RUN_ID }}
          MODEL_PATH: ${{ env.MODEL_PATH }}

      - name: Download MLflow Artifact to Local
        run: |
          echo "Downloading artifact: runs:/$RUN_ID/$MODEL_PATH"
          mlflow artifacts download \
            -u "runs:/$RUN_ID/$MODEL_PATH" \
            -d ./downloaded_model
          echo ""
          echo "=== Isi ./downloaded_model ==="
          ls -la ./downloaded_model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}

      - name: Install Python dependencies
        run: pip install google-auth google-auth-oauthlib google-api-python-client

      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          filename: "."
          folderId: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          overwrite: true

      - name: Build Docker Model
        run: |
          echo "Building Docker image from local artifact..."
          mlflow models build-docker \
            -m ./downloaded_model \
            -n "${{ secrets.DOCKER_USERNAME }}/telco-churn-model" \
            --enable-mlserver

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Tag Docker Image
        run: docker tag ${{ secrets.DOCKER_USERNAME }}/telco-churn-model ${{ secrets.DOCKER_USERNAME }}/telco-churn-model:latest

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/telco-churn-model:latest
