name: CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check Environment
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure MLflow Tracking URI
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          if [ -z "$MLFLOW_TRACKING_URI" ]; then
            echo "WARNING: MLFLOW_TRACKING_URI is not set. Using local file storage."
            echo "MLFLOW_TRACKING_URI=file://${GITHUB_WORKSPACE}/mlruns" >> $GITHUB_ENV
          else
            echo "MLFLOW_TRACKING_URI=$MLFLOW_TRACKING_URI" >> $GITHUB_ENV
          fi

          if [ -n "$DAGSHUB_USERNAME" ]; then
            echo "MLFLOW_TRACKING_USERNAME=$DAGSHUB_USERNAME" >> $GITHUB_ENV
          fi

          if [ -n "$DAGSHUB_TOKEN" ]; then
            echo "MLFLOW_TRACKING_PASSWORD=$DAGSHUB_TOKEN" >> $GITHUB_ENV
          fi

      - name: Run MLflow Project
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: mlflow run MLProject --env-manager=local

      - name: Extract RUN_ID and MODEL_PATH
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python << 'EOF'
          import mlflow
          import os
          import sys
          from mlflow.tracking import MlflowClient

          tracking_uri = os.getenv('MLFLOW_TRACKING_URI')
          if tracking_uri:
            mlflow.set_tracking_uri(tracking_uri)

          client = MlflowClient()

          try:
            experiment = client.get_experiment_by_name('Default')
            if experiment is None:
              experiment = client.get_experiment('0')
            if experiment is None:
              experiments = client.search_experiments()
              if not experiments:
                raise ValueError("Tidak ada experiment yang ditemukan!")
              experiment = experiments[0]

            print(f"✓ Experiment ditemukan: {experiment.name} (ID: {experiment.experiment_id})")

            runs = client.search_runs(
              experiment_ids=[experiment.experiment_id],
              order_by=['start_time DESC'],
              max_results=1
            )

            if not runs:
              raise ValueError(f"Tidak ada run di experiment '{experiment.name}'")

            run_id = runs[0].info.run_id
            print(f"✓ Run ID terbaru: {run_id}")

            artifacts = client.list_artifacts(run_id)
            if not artifacts:
              raise ValueError(f"Tidak ada artifacts di run {run_id}")

            print("\nArtifacts yang ditemukan:")
            for artifact in artifacts:
              status = '[DIR]' if artifact.is_dir else '[FILE]'
              print(f"  {status} {artifact.path}")

            model_path = 'model'
            for artifact in artifacts:
              if artifact.is_dir and artifact.path == 'model':
                model_path = 'model'
                print(f"\n✓ Model path terdeteksi: {model_path}")
                break

            with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"RUN_ID={run_id}\n")
              f.write(f"MODEL_PATH={model_path}\n")
              f.write(f"MODEL_URI=runs:/{run_id}/{model_path}\n")

            print(f"\n✓ Environment variables berhasil di-set:")
            print(f"  RUN_ID={run_id}")
            print(f"  MODEL_PATH={model_path}")
            print(f"  MODEL_URI=runs:/{run_id}/{model_path}")

          except Exception as e:
            print(f"Error: {str(e)}")
            sys.exit(1)
          EOF

      - name: Verify Environment Variables
        run: |
          echo "✓ RUN_ID = $RUN_ID"
          echo "✓ MODEL_PATH = $MODEL_PATH"
          echo "✓ MODEL_URI = $MODEL_URI"

      - name: Install Docker Build Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -q docker

      - name: Build Docker Image
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          DOCKER_USER=$(echo "${{ secrets.DOCKER_USERNAME_NEW }}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')
          IMAGE_NAME="$DOCKER_USER/telco-churn-model:latest"

          echo "Generate Dockerfile dari model: $MODEL_URI"
          mlflow models generate-dockerfile --model-uri "$MODEL_URI" --output-directory build_dir

          # FIX 1: Perbaiki apt install
          sed -i 's/apt install/apt-get update -y \&\& apt-get install/g' build_dir/Dockerfile
          
          # FIX 2: Perbaiki URL get-pip.py khusus untuk Python 3.9
          sed -i 's|https://bootstrap.pypa.io/get-pip.py|https://bootstrap.pypa.io/pip/3.9/get-pip.py|g' build_dir/Dockerfile

          echo "Membangun image: $IMAGE_NAME"
          docker build -t "$IMAGE_NAME" build_dir/ || { echo "Docker build failed"; exit 1; }

          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "Docker build berhasil: $IMAGE_NAME"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME_NEW }}
          password: ${{ secrets.DOCKER_TOKEN_NEW }}

      - name: Push Docker Image to Docker Hub
        run: |
          echo "Pushing Docker image ke Docker Hub..."
          docker push "$IMAGE_NAME"
          echo "Docker image berhasil di-push"
          echo "Link: https://hub.docker.com/r/$(echo '${{ secrets.DOCKER_USERNAME_NEW }}' | tr '[:upper:]' '[:lower:]')/telco-churn-model"

      - name: Upload Training Summary
        uses: actions/upload-artifact@v4
        with:
          name: training-summary
          path: |
            mlruns/
          retention-days: 30
