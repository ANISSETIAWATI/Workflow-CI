name: CI
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"
      - name: Check Env
        run: python --version
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Set MLflow Tracking URI
        run: echo "MLFLOW_TRACKING_URI=${{ secrets.https://dagshub.com/ANISSETIAWATI/my-first-repo.mlflow }}" >> $GITHUB_ENV
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.https://dagshub.com/ANISSETIAWATI/my-first-repo.mlflow }}
      - name: Run mlflow project
        run: mlflow run MLProject --env-manager=local
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.https://dagshub.com/ANISSETIAWATI/my-first-repo.mlflow }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.terbaru_wokrflow-ci }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.29903d82a9074814370c341059ae55f99e8f2558 }}
      - name: Install Python dependencies
        run: pip install google-auth google-auth-oauthlib google-api-python-client
      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: .
