name: MLflow CI - Train and Build Docker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  train-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure MLflow tracking
        env:
          SECRET_MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          SECRET_MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          SECRET_MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          if [ -n "$SECRET_MLFLOW_TRACKING_URI" ]; then
            echo "MLFLOW_TRACKING_URI=$SECRET_MLFLOW_TRACKING_URI" >> "$GITHUB_ENV"
          else
            echo "MLFLOW_TRACKING_URI=file://${GITHUB_WORKSPACE}/mlruns" >> "$GITHUB_ENV"
          fi

          if [ -n "$SECRET_MLFLOW_TRACKING_USERNAME" ]; then
            echo "MLFLOW_TRACKING_USERNAME=$SECRET_MLFLOW_TRACKING_USERNAME" >> "$GITHUB_ENV"
          elif [ -n "$DAGSHUB_USERNAME" ]; then
            echo "MLFLOW_TRACKING_USERNAME=$DAGSHUB_USERNAME" >> "$GITHUB_ENV"
          fi

          if [ -n "$SECRET_MLFLOW_TRACKING_PASSWORD" ]; then
            echo "MLFLOW_TRACKING_PASSWORD=$SECRET_MLFLOW_TRACKING_PASSWORD" >> "$GITHUB_ENV"
          elif [ -n "$DAGSHUB_TOKEN" ]; then
            echo "MLFLOW_TRACKING_PASSWORD=$DAGSHUB_TOKEN" >> "$GITHUB_ENV"
          fi

      - name: Run MLflow Project
        run: |
          mlflow run MLProject --env-manager=local

      - name: Validate MLflow model artifact
        run: |
          python - <<'PY'
          import os
          import mlflow
          from mlflow.tracking import MlflowClient

          run_id = os.environ["RUN_ID"]
          model_path = os.environ.get("MODEL_PATH", "model")
          client = MlflowClient()

          print("Tracking URI:", mlflow.get_tracking_uri())
          print("Run ID:", run_id)
          print("Model path:", model_path)

          run = client.get_run(run_id)
          print("Artifact URI:", run.info.artifact_uri)

          root_artifacts = client.list_artifacts(run_id)
          print("Root artifacts:")
          for artifact in root_artifacts:
              print("-", artifact.path, "dir=", artifact.is_dir)

          model_artifacts = client.list_artifacts(run_id, model_path)
          if not model_artifacts:
              raise RuntimeError(
                  f"Model artifact '{model_path}' tidak ditemukan di run {run_id}."
              )

          print("Model artifacts ditemukan:")
          for artifact in model_artifacts:
              print("-", artifact.path, "dir=", artifact.is_dir)
          PY

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image from MLflow model
        run: |
          IMAGE_NAME="${{ secrets.DOCKER_USERNAME }}/telco-churn-ci"
          echo "IMAGE_NAME=$IMAGE_NAME" >> "$GITHUB_ENV"
          echo "Building Docker image with $MODEL_URI"
          mlflow models build-docker \
            -m "$MODEL_URI" \
            -n "$IMAGE_NAME:latest" \
            --enable-mlserver

      - name: Push Docker image
        run: |
          docker push "$IMAGE_NAME:latest"
          echo "https://hub.docker.com/r/$IMAGE_NAME" > docker_hub_link.txt
          cat docker_hub_link.txt

      - name: Upload Docker Hub link artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker_hub_link
          path: docker_hub_link.txt
